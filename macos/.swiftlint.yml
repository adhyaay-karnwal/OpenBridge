# SwiftLint Configuration

disabled_rules:
  - todo
  - trailing_whitespace
  - trailing_comma
  - identifier_name
  - opening_brace
  - closure_parameter_position
  - multiple_closures_with_trailing_closure
  - for_where
  - implicit_optional_initialization
  - line_length

file_length:
  warning: 1500
  error: 2500
  ignore_comment_only_lines: true

function_body_length:
  warning: 100
  error: 150

function_parameter_count:
  warning: 8
  error: 10

type_body_length:
  warning: 1000
  error: 1500

type_name:
  min_length: 3
  max_length: 60

nesting:
  type_level: 3
  function_level: 4

excluded:
  - Pods
  - .build
  - "**/.build"
  - Packages
  - DerivedData
  - Carthage
  - OpenBridge.xcworkspace
  - Cueboard.xcodeproj
  - DevKit
  - LenshotKit
  - JSBridge/.build
  - ScrubberKit/.build
  - ComposerEditor/.build
  - ComputerUse
  - BridgeComputerUse

reporter: "xcode"
strict: false
